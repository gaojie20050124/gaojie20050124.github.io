<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>BMW M3 Driving</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: linear-gradient(145deg, #0a2f3a, #1a4a5a);
        }
        .car {
            position: absolute;
            bottom: 50px;
            left: -350px;
            width: 320px;
            animation: drive 6s linear forwards;
        }
        .car img {
            width: 100%;
            display: block;
        }
        @keyframes drive {
            0% { left: -350px; bottom: 30px; }
            100% { left: 100%; bottom: 280px; }
        }
    </style>
</head>
<body>
    <div class="car">
        < img src="https://www.pngmart.com/files/21/BMW-M3-PNG-Photo.png" alt="BMW M3">
    </div>
</body>
</html>
