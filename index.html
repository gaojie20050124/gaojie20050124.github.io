<!DOCTYPE html>
<html>
<head>
    <title>BMW M3 Driving</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #1a4a5a;
        }
        .car {
            position: absolute;
            top: -200px;
            left: -400px;
            width: 320px;
            animation: drive 5s linear forwards;
        }
        .car img {
            width: 100%;
            display: block;
        }
        @keyframes drive {
            0% {
                left: -400px;
                top: -200px;
            }
            100% {
                left: 100%;
                top: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="car">
        < img src="bmw.jpg" alt="BMW M3">
    </div>
</body>
</html>
