<!DOCTYPE html>
<html>
<head>
    <title>Test</title>
</head>
<body>
    <h1>Hello! Car is coming...</h1>
    <div style="position: absolute; bottom: 50px; left: 0; width: 100px; height: 50px; background: red; animation: drive 3s linear forwards;"></div>
    <style>
        @keyframes drive {
            0% { left: -100px; }
            100% { left: 100%; }
        }
    </style>
</body>
</html>
