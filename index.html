<!DOCTYPE html>
<html>
<head>
    <title>BMW M3 - Real Car</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #2c3e2f;
        }
        .car {
            position: absolute;
            bottom: 100px;
            left: -400px;
            width: 350px;
            animation: drive 4s linear forwards;
        }
        .car img {
            width: 100%;
            display: block;
        }
        @keyframes drive {
            0% {
                left: -400px;
                bottom: 100px;
            }
            100% {
                left: 100%;
                bottom: 300px;
            }
        }
    </style>
</head>
<body>
    <div class="car">
        < img src="bmw.png" alt="BMW M3">
    </div>
</body>
</html>
